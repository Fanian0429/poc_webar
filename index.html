<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>POC_WebAR_GeoSLAM</title>
  <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    #ar-overlay-root {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; pointer-events: none;
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%;
      box-sizing: border-box; padding: 54px 14px 10px 14px;
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      color: #fff; background: rgba(0,0,0,0.55);
      font-size: 13px; line-height: 1.6;
      pointer-events: none;
    }
    #controls {
      position: fixed; bottom: 0; left: 0; width: 100%;
      box-sizing: border-box; padding: 16px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: auto;
    }
    button {
      font-size: 15px; padding: 12px 22px; border-radius: 8px; border: none;
      background: #2979ff; color: #fff; font-weight: bold;
    }
    button:disabled { background: #555; }
    #adjust-row, #adjust-row2 { display: flex; gap: 8px; }
    #adjust-row button, #adjust-row2 button { padding: 8px 14px; font-size: 14px; background: #444; }
    #status-line { white-space: pre-line; }
  </style>
</head>
<body>

  <div id="ar-overlay-root">
    <div id="overlay">
      <div id="status-line">尚未開始</div>
    </div>

    <div id="controls">
      <div id="adjust-row" style="display:none;">
        <button id="y-up">高度 ▲</button>
        <button id="y-down">高度 ▼</button>
        <button id="rot-minus">-5°</button>
        <button id="rot-plus">+5°</button>
      </div>
      <div id="adjust-row2" style="display:none;">
        <button id="recalibrate-btn">依GPS校準</button>
        <button id="place-here-btn">放在目前位置</button>
      </div>
      <button id="start-btn">開始 AR 體驗</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

    // ---------------------------------------------------------------
    // 專案設定：目標建物 GPS 座標與模型資訊
    // ---------------------------------------------------------------
    const TARGET_LAT = 24.183192;
    const TARGET_LON = 120.613790;
    const MODEL_URL = './1BR.gltf';
    const MODEL_SCALE = 1; // 若模型單位是公尺，先從 1 開始測試，依實際狀況調整

    // 羅盤讀值在不同裝置/瀏覽器上常有系統性偏移(常見 ±15~30°)。
    // 這個版本改用「依GPS校準」按鈕搭配旋轉/高度微調按鈕現場修正，
    // 如仍需要調整羅盤基礎偏移，可直接修改這個常數後重新部署。
    let headingOffset = 0;

    // ---------------------------------------------------------------
    // 狀態變數
    // ---------------------------------------------------------------
    let userLat = null, userLon = null, gpsAccuracy = null;
    let currentHeading = null;
    let model = null;
    let modelPlaced = false;

    let xrSession = null;
    let hitTestSource = null;
    let hitTestSourceRequested = false;
    let lastHitPose = null; // 保留最近一次 hit-test 結果，供「重新錨定」使用

    const statusEl = document.getElementById('status-line');
    const startBtn = document.getElementById('start-btn');
    const adjustRow = document.getElementById('adjust-row');
    const adjustRow2 = document.getElementById('adjust-row2');

    function updateStatus(extra) {
      const dist = (userLat !== null) ? haversineDistance(userLat, userLon, TARGET_LAT, TARGET_LON).toFixed(1) + ' m' : '-';
      const brng = (userLat !== null) ? bearing(userLat, userLon, TARGET_LAT, TARGET_LON).toFixed(0) + '°' : '-';
      statusEl.textContent =
        `GPS: ${userLat ? userLat.toFixed(6) : '-'}, ${userLon ? userLon.toFixed(6) : '-'} (精度 ${gpsAccuracy ? gpsAccuracy.toFixed(0)+'m' : '-'})\n` +
        `目標距離: ${dist}　方位角: ${brng}\n` +
        `羅盤朝向: ${currentHeading !== null ? currentHeading.toFixed(0)+'°' : '-'}　校正偏移: ${headingOffset}°\n` +
        (extra ? extra : '');
    }

    // ---------------------------------------------------------------
    // 地理計算：距離(Haversine)與方位角(Bearing)
    // ---------------------------------------------------------------
    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function bearing(lat1, lon1, lat2, lon2) {
      const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
      const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
      const brng = toDeg(Math.atan2(y, x));
      return (brng + 360) % 360; // 0-360, 0=正北, 順時鐘
    }

    // ---------------------------------------------------------------
    // GPS：持續追蹤使用者位置
    // ---------------------------------------------------------------
    function startGeolocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('此瀏覽器不支援 Geolocation'));
          return;
        }
        navigator.geolocation.watchPosition(
          (pos) => {
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;
            gpsAccuracy = pos.coords.accuracy;
            updateStatus();
            resolve();
          },
          (err) => {
            console.error('Geolocation error', err);
            reject(err);
          },
          { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
        );
      });
    }

    // ---------------------------------------------------------------
    // 羅盤：取得裝置目前朝向真北的夾角(Android Chrome: deviceorientationabsolute)
    // ---------------------------------------------------------------
    function startCompass() {
      window.addEventListener('deviceorientationabsolute', (event) => {
        if (event.alpha === null) return;
        // 注意：alpha 的方向定義在不同裝置上可能相反，
        // 如發現模型方向錯誤，可用「-5°/+5°」旋轉按鈕現場校正
        currentHeading = (event.alpha + headingOffset + 360) % 360;
        updateStatus();
      }, true);
    }

    document.getElementById('y-up').addEventListener('click', () => {
      if (!model) return;
      model.position.y += 0.1;
      updateStatus('已將模型高度上移 0.1m(目前 Y: ' + model.position.y.toFixed(2) + ')');
    });
    document.getElementById('y-down').addEventListener('click', () => {
      if (!model) return;
      model.position.y -= 0.1;
      updateStatus('已將模型高度下移 0.1m(目前 Y: ' + model.position.y.toFixed(2) + ')');
    });
    document.getElementById('rot-plus').addEventListener('click', () => {
      if (!model) return;
      model.rotation.y += toRad(5);
      updateStatus('已順時鐘旋轉 5°');
    });
    document.getElementById('rot-minus').addEventListener('click', () => {
      if (!model) return;
      model.rotation.y -= toRad(5);
      updateStatus('已逆時鐘旋轉 5°');
    });
    document.getElementById('recalibrate-btn').addEventListener('click', () => {
      // 使用最近一次偵測到的平面，依目前 GPS + 羅盤重新計算模型位置
      if (lastHitPose && xrSession) {
        placeModel(lastHitPose.pose, lastHitPose.frame, lastHitPose.referenceSpace);
      } else {
        updateStatus('尚未偵測到平面，無法依 GPS 校準。');
      }
    });
    document.getElementById('place-here-btn').addEventListener('click', () => {
      // 忽略 GPS，直接把模型放在目前偵測到的平面位置(面向使用者)
      if (!lastHitPose || !xrSession) { updateStatus('尚未偵測到平面，無法放置。'); return; }
      if (!model) { updateStatus('模型尚未載入完成。'); return; }

      const { pose, frame, referenceSpace } = lastHitPose;
      const camPose = frame.getViewerPose(referenceSpace);
      if (!camPose) return;
      const camPos = camPose.transform.position;
      const hitPos = pose.transform.position;

      model.position.set(hitPos.x, hitPos.y, hitPos.z);
      model.rotation.y = Math.atan2(camPos.x - hitPos.x, camPos.z - hitPos.z);
      model.visible = true;
      modelPlaced = true;
      updateStatus('已忽略 GPS，將模型放置於目前偵測到的平面位置。');
    });

    // ---------------------------------------------------------------
    // Three.js 基本場景
    // ---------------------------------------------------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 0.6);
    scene.add(hemiLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
    dirLight.position.set(-1, 4, 2);
    scene.add(dirLight);
    scene.add(dirLight.target); // DirectionalLight 的 target 必須加入場景，調整 target.position 才會生效
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.25);
    fillLight.position.set(1, 2, -2); // 從主光源反方向補光，避免背光面全黑
    scene.add(fillLight);

    // 若目標裝置上模型仍然顯示過暗/全黑(常見於材質需要環境反射光才會正確顯示的狀況)，
    // 可以把這個開關打開，模型會改用不受光照影響的原始顏色顯示，確保絕對不會全黑
    const USE_FLAT_SHADING_FALLBACK = false;

    function applyFlatShadingFallback(root) {
      root.traverse((node) => {
        if (node.isMesh && node.material) {
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach((mat) => {
            if (mat.map || mat.color) {
              const flatMat = new THREE.MeshBasicMaterial({
                map: mat.map || null,
                color: mat.color ? mat.color.clone() : 0xffffff
              });
              node.material = Array.isArray(node.material) ? node.material.map(() => flatMat) : flatMat;
            }
          });
        }
      });
    }

    // ---------------------------------------------------------------
    // 太陽光模擬：依目前 GPS + 系統時間計算太陽方位角與仰角，調整方向光
    // 注意：suncalc 1.9.0 回傳弧度(radian)，azimuth 以「正南」為 0，順時鐘朝西增加
    // (與一般羅盤「正北為 0」的方位角定義不同，這裡已經做轉換)
    // ---------------------------------------------------------------
    let lastSunUpdateTime = 0;

    function updateSunLighting(camPose) {
      if (typeof SunCalc === 'undefined') return;
      if (userLat === null || userLon === null || currentHeading === null) return;

      const now = new Date();
      const sunPos = SunCalc.getPosition(now, userLat, userLon);
      const altitude = sunPos.altitude; // 弧度，0=地平線，PI/2=正上方
      const sunBearing = (toDeg(sunPos.azimuth) + 180 + 360) % 360; // 轉換成「正北為 0」的方位角

      const camOri = camPose.transform.orientation;
      const camQuat = new THREE.Quaternion(camOri.x, camOri.y, camOri.z, camOri.w);
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camQuat);
      forward.y = 0;
      forward.normalize();

      const relativeAngle = toRad(sunBearing - currentHeading);
      const horizDir = forward.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), -relativeAngle);

      const sunDir = new THREE.Vector3(
        horizDir.x * Math.cos(altitude),
        Math.sin(altitude),
        horizDir.z * Math.cos(altitude)
      ).normalize();

      dirLight.position.copy(sunDir.clone().multiplyScalar(50));
      if (model) {
        dirLight.target.position.copy(model.position);
      }

      if (altitude <= 0) {
        // 太陽在地平線以下：降低方向光，改以環境光維持基本可視度(避免全黑)
        dirLight.intensity = 0.2;
        dirLight.color.set(0x4466aa);
        hemiLight.intensity = 0.9;
      } else if (altitude < toRad(10)) {
        // 日出/日落前後：暖色調、光線角度低
        dirLight.intensity = 0.9;
        dirLight.color.set(0xffaa66);
        hemiLight.intensity = 0.5;
      } else {
        // 一般日間
        dirLight.intensity = 1.2;
        dirLight.color.set(0xffffff);
        hemiLight.intensity = 0.6;
      }
    }

    const loader = new GLTFLoader();
    loader.load(
      MODEL_URL,
      (gltf) => {
        model = gltf.scene;
        model.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
        model.visible = false;
        if (USE_FLAT_SHADING_FALLBACK) {
          applyFlatShadingFallback(model);
        }
        scene.add(model);
        updateStatus('模型已載入，等待 AR 平面偵測');
      },
      undefined,
      (err) => {
        console.error('GLTF load error', err);
        updateStatus('模型載入失敗，請確認 1BR.gltf 路徑是否正確');
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------------------------------------------------------------
    // 啟動流程：權限確認 -> WebXR session -> hit-test -> 放置模型
    // ---------------------------------------------------------------
    startBtn.addEventListener('click', onStart);

    async function onStart() {
      startBtn.disabled = true;
      startBtn.textContent = '啟動中...';

      if (!navigator.xr) {
        updateStatus('此瀏覽器不支援 WebXR，請改用 Android 上的 Chrome。');
        startBtn.disabled = false;
        startBtn.textContent = '開始 AR 體驗';
        return;
      }

      const supported = await navigator.xr.isSessionSupported('immersive-ar');
      if (!supported) {
        updateStatus('此裝置/瀏覽器不支援 immersive-ar，請確認是 Android + Chrome，且裝置支援 ARCore。');
        startBtn.disabled = false;
        startBtn.textContent = '開始 AR 體驗';
        return;
      }

      try {
        updateStatus('請求 GPS 權限中...');
        await startGeolocation();
        startCompass();
      } catch (e) {
        updateStatus('GPS 權限取得失敗，AR 模型仍可顯示但無法定位到正確 GPS 位置。');
      }

      try {
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test', 'local'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.getElementById('ar-overlay-root') }
        });

        xrSession = session;
        session.addEventListener('end', onSessionEnd);

        renderer.xr.setReferenceSpaceType('local');
        await renderer.xr.setSession(session);

        startBtn.style.display = 'none';
        adjustRow.style.display = 'flex';
        adjustRow2.style.display = 'flex';

        renderer.setAnimationLoop(onXRFrame);
      } catch (e) {
        console.error(e);
        updateStatus('WebXR session 啟動失敗: ' + e.message);
        startBtn.disabled = false;
        startBtn.textContent = '開始 AR 體驗';
      }
    }

    function onSessionEnd() {
      xrSession = null;
      hitTestSource = null;
      hitTestSourceRequested = false;
      modelPlaced = false;
      if (model) model.visible = false;
      startBtn.style.display = 'block';
      startBtn.disabled = false;
      startBtn.textContent = '開始 AR 體驗';
      adjustRow.style.display = 'none';
      adjustRow2.style.display = 'none';
      renderer.setAnimationLoop(null);
    }

    async function initHitTestSource() {
      const viewerSpace = await xrSession.requestReferenceSpace('viewer');
      hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
    }

    function onXRFrame(timestamp, frame) {
      if (!hitTestSourceRequested) {
        hitTestSourceRequested = true;
        initHitTestSource();
      }

      const referenceSpace = renderer.xr.getReferenceSpace();
      const camPose = frame.getViewerPose(referenceSpace);

      if (hitTestSource) {
        const hitTestResults = frame.getHitTestResults(hitTestSource);
        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          const pose = hit.getPose(referenceSpace);
          lastHitPose = { pose, frame, referenceSpace };
          if (!modelPlaced) {
            placeModel(pose, frame, referenceSpace);
          }
        } else if (!modelPlaced) {
          updateStatus('請將手機朝向地面/桌面掃描平面中...');
        }
      }

      if (camPose && timestamp - lastSunUpdateTime > 5000) {
        lastSunUpdateTime = timestamp;
        updateSunLighting(camPose);
      }

      renderer.render(scene, camera);
    }

    // ---------------------------------------------------------------
    // 核心邏輯：依 GPS 距離/方位角 + 羅盤朝向，計算模型在 XR 世界座標中的位置
    // ---------------------------------------------------------------
    function placeModel(pose, frame, referenceSpace) {
      if (!model) { updateStatus('模型尚未載入完成...'); return; }
      if (userLat === null || userLon === null) { updateStatus('等待 GPS 定位中...'); return; }
      if (currentHeading === null) { updateStatus('等待羅盤資料中...'); return; }

      const distance = haversineDistance(userLat, userLon, TARGET_LAT, TARGET_LON);
      const targetBearing = bearing(userLat, userLon, TARGET_LAT, TARGET_LON);

      // 取得目前相機在 XR local 座標系中的實際朝向(不能假設等於世界 -Z 軸，
      // 因為使用者掃描平面時手機通常已經轉動過)
      const camPose = frame.getViewerPose(referenceSpace);
      if (!camPose) return;
      const camPos = camPose.transform.position;
      const camOri = camPose.transform.orientation;

      const camQuat = new THREE.Quaternion(camOri.x, camOri.y, camOri.z, camOri.w);
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camQuat);
      forward.y = 0;
      forward.normalize();

      // 目標方位角與目前羅盤朝向的夾角，套用到 forward 向量上得到實際世界座標方向
      // 若測試時發現模型方向左右相反，把下面這行的負號拿掉即可(羅盤定義因裝置而異)
      const relativeAngle = toRad(targetBearing - currentHeading);
      const targetDir = forward.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), -relativeAngle);

      model.position.set(
        camPos.x + targetDir.x * distance,
        pose.transform.position.y, // 高度使用 hit-test 偵測到的平面 Y 座標
        camPos.z + targetDir.z * distance
      );

      // 模型面向：讓模型正面朝向使用者站立的方向(可依模型原始朝向調整角度)
      model.rotation.y = Math.atan2(targetDir.x, targetDir.z);

      model.visible = true;
      modelPlaced = true;
      updateStatus('模型已錨定完成。之後的穩定度將完全依賴裝置 SLAM 追蹤，不再重新計算座標。');
    }
  </script>
</body>
</html>
