<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>POC_WebAR_GeoSLAM</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    #ar-overlay-root {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; pointer-events: none;
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%;
      box-sizing: border-box; padding: 54px 14px 10px 14px;
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      color: #fff; background: rgba(0,0,0,0.55);
      font-size: 13px; line-height: 1.6;
      pointer-events: none;
    }
    #controls {
      position: fixed; bottom: 0; left: 0; width: 100%;
      box-sizing: border-box; padding: 16px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: auto;
    }
    button {
      font-size: 15px; padding: 12px 22px; border-radius: 8px; border: none;
      background: #2979ff; color: #fff; font-weight: bold;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.08s ease, transform 0.08s ease, filter 0.08s ease;
    }
    button:disabled { background: #555; }
    #adjust-row, #adjust-row2, #floor-row { display: flex; gap: 8px; }
    #adjust-row button, #adjust-row2 button, #floor-row button { padding: 8px 14px; font-size: 14px; background: #444; }

    /* 按下時的視覺回饋：灰色按鈕轉藍色、主按鈕變暗，並縮小一點模擬按壓感 */
    #adjust-row button.pressed, #adjust-row2 button.pressed, #floor-row button.pressed {
      background: #2979ff;
      transform: scale(0.94);
    }
    #start-btn.pressed {
      filter: brightness(0.75);
      transform: scale(0.96);
    }

    #status-line { white-space: pre-line; }
  </style>
</head>
<body>

  <div id="ar-overlay-root">
    <div id="overlay">
      <div id="status-line">Not started yet</div>
    </div>

    <div id="controls">
      <div id="adjust-row" style="display:none;">
        <button id="y-up">Height ▲</button>
        <button id="y-down">Height ▼</button>
        <button id="rot-minus">-5°</button>
        <button id="rot-plus">+5°</button>
      </div>
      <div id="floor-row" style="display:none;">
        <button id="floor-up">Upstairs ▲</button>
        <button id="floor-down">Downstairs ▼</button>
      </div>
      <div id="adjust-row2" style="display:none;">
        <button id="recalibrate-btn">Calibrate by GPS</button>
        <button id="place-here-btn">Place Here</button>
      </div>
      <button id="start-btn">Start AR Experience</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js';

    // ---------------------------------------------------------------
    // 專案設定：目標建物 GPS 座標與模型資訊
    // ---------------------------------------------------------------
    const TARGET_LAT = 24.183192;
    const TARGET_LON = 120.613790;
    const MODEL_URL = './townhouse.glb';
    const MODEL_SCALE = 1; // 若模型單位是公尺，先從 1 開始測試，依實際狀況調整

    // 羅盤讀值在不同裝置/瀏覽器上常有系統性偏移(常見 ±15~30°)。
    // 可用「Calibrate by GPS」搭配旋轉/高度按鈕現場修正，
    // 若需要調整羅盤基礎偏移，可直接修改這個常數後重新部署。
    let headingOffset = 0;

    // ---------------------------------------------------------------
    // 狀態變數
    // ---------------------------------------------------------------
    let userLat = null, userLon = null, gpsAccuracy = null;
    let currentHeading = null;
    let model = null;
    let modelPlaced = false;

    let xrSession = null;
    let hitTestSource = null;
    let hitTestSourceRequested = false;
    let previewModeActive = false; // 桌面/不支援 AR 的裝置：改用一般 3D 場景預覽模型，不走 AR 流程

    // 重要：XRFrame 物件只在當次 rAF callback 內有效，不能存起來給按鈕(非同步事件)之後重複使用。
    // 這裡改成只快取「數值/向量」，按鈕只讀這些快取值，不再依賴過期的 frame 物件。
    let lastCameraPosition = null;   // { x, y, z }
    let lastCameraForward = null;    // THREE.Vector3 (水平面上的朝向)
    let lastHitPosition = null;      // { x, y, z } 最近一次偵測到的平面位置
    let planeEverDetected = false;   // 用來只觸發一次「Plane detected successfully」訊息

    // 畫面最下面一行的訊息，預設不會被 GPS/羅盤的數值更新覆蓋掉，
    // 只有明確呼叫 updateStatus(newMessage) 時才會更新，確保訊息不會瞬間被洗掉
    let lastMessage = 'Not started yet';

    const statusEl = document.getElementById('status-line');
    const startBtn = document.getElementById('start-btn');
    const adjustRow = document.getElementById('adjust-row');
    const adjustRow2 = document.getElementById('adjust-row2');
    const floorRow = document.getElementById('floor-row');

    function updateStatus(newMessage) {
      if (newMessage !== undefined) {
        lastMessage = newMessage;
      }
      const dist = (userLat !== null) ? haversineDistance(userLat, userLon, TARGET_LAT, TARGET_LON).toFixed(1) + ' m' : '-';
      const brng = (userLat !== null) ? bearing(userLat, userLon, TARGET_LAT, TARGET_LON).toFixed(0) + '°' : '-';
      statusEl.textContent =
        `GPS: ${userLat ? userLat.toFixed(6) : '-'}, ${userLon ? userLon.toFixed(6) : '-'} (accuracy ${gpsAccuracy ? gpsAccuracy.toFixed(0)+'m' : '-'})\n` +
        `Target distance: ${dist}   Bearing: ${brng}\n` +
        `Compass heading: ${currentHeading !== null ? currentHeading.toFixed(0)+'°' : '-'}   Offset: ${headingOffset}°\n` +
        lastMessage;
    }

    // ---------------------------------------------------------------
    // 地理計算：距離(Haversine)與方位角(Bearing)
    // ---------------------------------------------------------------
    function toRad(deg) { return deg * Math.PI / 180; }
    function toDeg(rad) { return rad * 180 / Math.PI; }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function bearing(lat1, lon1, lat2, lon2) {
      const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
      const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
      const brng = toDeg(Math.atan2(y, x));
      return (brng + 360) % 360; // 0-360, 0=正北, 順時鐘
    }

    // ---------------------------------------------------------------
    // GPS：持續追蹤使用者位置
    // ---------------------------------------------------------------
    function startGeolocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('Geolocation not supported by this browser'));
          return;
        }
        navigator.geolocation.watchPosition(
          (pos) => {
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;
            gpsAccuracy = pos.coords.accuracy;
            updateStatus(); // 不帶參數 = 只刷新數值列，不會動到最後一行的訊息
            resolve();
          },
          (err) => {
            console.error('Geolocation error', err);
            reject(err);
          },
          { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
        );
      });
    }

    // ---------------------------------------------------------------
    // 羅盤：取得裝置目前朝向真北的夾角(Android Chrome: deviceorientationabsolute)
    // ---------------------------------------------------------------
    function startCompass() {
      window.addEventListener('deviceorientationabsolute', (event) => {
        if (event.alpha === null) return;
        // 注意：alpha 的方向定義在不同裝置上可能相反，
        // 如發現模型方向錯誤，可用「-5°/+5°」旋轉按鈕現場校正
        currentHeading = (event.alpha + headingOffset + 360) % 360;
        updateStatus();
      }, true);
    }

    // ---------------------------------------------------------------
    // 按鈕按壓視覺回饋：pointerdown 轉換樣式、pointerup/leave/cancel 還原
    // ---------------------------------------------------------------
    function addPressEffect(btn) {
      const press = () => btn.classList.add('pressed');
      const release = () => btn.classList.remove('pressed');
      btn.addEventListener('pointerdown', press);
      btn.addEventListener('pointerup', release);
      btn.addEventListener('pointerleave', release);
      btn.addEventListener('pointercancel', release);
    }
    document.querySelectorAll('#controls button').forEach(addPressEffect);

    document.getElementById('y-up').addEventListener('click', () => {
      if (!model) return;
      model.position.y += 0.1;
      updateStatus('Height raised by 0.1m (current Y: ' + model.position.y.toFixed(2) + ')');
    });
    document.getElementById('y-down').addEventListener('click', () => {
      if (!model) return;
      model.position.y -= 0.1;
      updateStatus('Height lowered by 0.1m (current Y: ' + model.position.y.toFixed(2) + ')');
    });
    document.getElementById('rot-plus').addEventListener('click', () => {
      if (!model) return;
      model.rotation.y += toRad(5);
      updateStatus('Rotated +5° (clockwise)');
    });
    document.getElementById('rot-minus').addEventListener('click', () => {
      if (!model) return;
      model.rotation.y -= toRad(5);
      updateStatus('Rotated -5° (counter-clockwise)');
    });
    document.getElementById('floor-up').addEventListener('click', () => {
      if (!model) return;
      model.position.y -= 3;
      updateStatus('Moved up one floor (+3m, current Y: ' + model.position.y.toFixed(2) + ')');
    });
    document.getElementById('floor-down').addEventListener('click', () => {
      if (!model) return;
      model.position.y += 3;
      updateStatus('Moved down one floor (-3m, current Y: ' + model.position.y.toFixed(2) + ')');
    });
    document.getElementById('recalibrate-btn').addEventListener('click', () => {
      if (lastHitPosition && lastCameraPosition && lastCameraForward) {
        placeModelFromCache();
      } else {
        updateStatus('No plane detected yet. Cannot calibrate.');
      }
    });
    document.getElementById('place-here-btn').addEventListener('click', () => {
      if (!lastHitPosition || !lastCameraPosition) { updateStatus('No plane detected yet. Cannot place model.'); return; }
      if (!model) { updateStatus('Model is not loaded yet.'); return; }

      model.position.set(lastHitPosition.x, lastHitPosition.y, lastHitPosition.z);
      model.rotation.y = Math.atan2(
        lastCameraPosition.x - lastHitPosition.x,
        lastCameraPosition.z - lastHitPosition.z
      );
      model.visible = true;
      modelPlaced = true;
      updateStatus('GPS ignored. Model placed at the currently detected surface.');
    });

    // ---------------------------------------------------------------
    // Three.js 基本場景與燈光
    // 需求：不再追蹤太陽方向，改用固定的均勻光照，盡量降低模型的明暗反差
    // ---------------------------------------------------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

    // 環境光(Hemisphere)拉高強度，作為主要照明來源，天生就是均勻的環境光，沒有方向性陰影
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0xcccccc, 1.3);
    scene.add(hemiLight);

    // 四顆低強度方向光，從東南西北四個角度均勻打光，
    // 每顆強度都刻意壓低且彼此相同，讓每個面都有基本亮度、不會有明顯的「亮面/暗面」對比
    const lightDirs = [
      [1, 2, 1],
      [-1, 2, 1],
      [1, 2, -1],
      [-1, 2, -1]
    ];
    const fillLights = lightDirs.map((pos) => {
      const l = new THREE.DirectionalLight(0xffffff, 0.35);
      l.position.set(pos[0], pos[1], pos[2]);
      scene.add(l);
      return l;
    });

    // 若實測後模型仍然有不想要的明暗差異，可以把這個開關打開，
    // 模型會改用不受光照影響的原始顏色顯示，保證絕對均勻
    const USE_FLAT_SHADING_FALLBACK = false;

    function applyFlatShadingFallback(root) {
      root.traverse((node) => {
        if (node.isMesh && node.material) {
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          const flatMats = materials.map((mat) => new THREE.MeshBasicMaterial({
            map: mat.map || null,
            color: mat.color ? mat.color.clone() : 0xffffff
          }));
          node.material = Array.isArray(node.material) ? flatMats : flatMats[0];
        }
      });
    }

    // ---------------------------------------------------------------
    // 邊緣線顯示：模擬 Rhino「彩現 + 顯示邊緣」模式，統一黑色線
    // 用 Three.js 內建的 EdgesGeometry 在執行期即時計算，不需要修改模型檔案本身
    // ---------------------------------------------------------------
    const SHOW_EDGES = true;
    const EDGE_COLOR = 0x000000;
    const EDGE_ANGLE_THRESHOLD = 30; // 相鄰面法線夾角超過幾度才畫線，數字越小線越多、越細碎

    function addEdgeOutlines(root) {
      const edgeMaterial = new THREE.LineBasicMaterial({ color: EDGE_COLOR });
      root.traverse((node) => {
        if (node.isMesh && node.geometry) {
          const edgesGeo = new THREE.EdgesGeometry(node.geometry, EDGE_ANGLE_THRESHOLD);
          const edgeLines = new THREE.LineSegments(edgesGeo, edgeMaterial);
          // 掛在 mesh 底下當子物件，這樣模型之後的 scale/position/rotation 調整會一併帶著邊緣線走
          node.add(edgeLines);
        }
      });
    }

    const loader = new GLTFLoader();
    loader.load(
      MODEL_URL,
      (gltf) => {
        model = gltf.scene;
        model.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
        model.visible = false;
        if (USE_FLAT_SHADING_FALLBACK) {
          applyFlatShadingFallback(model);
        }
        if (SHOW_EDGES) {
          addEdgeOutlines(model);
        }
        scene.add(model);
        if (previewModeActive) {
          model.visible = true; // 預覽模式沒有 GPS/hit-test 流程，模型載入完就直接顯示
        }
        updateStatus('Model loaded. Waiting for AR plane detection.');
      },
      undefined,
      (err) => {
        console.error('GLTF load error', err);
        updateStatus('Failed to load model. Please check the townhouse.glb path.');
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------------------------------------------------------------
    // 啟動流程：權限確認 -> WebXR session -> hit-test -> 放置模型
    // ---------------------------------------------------------------
    startBtn.addEventListener('click', onStart);

    async function onStart() {
      startBtn.disabled = true;
      startBtn.textContent = 'Starting...';

      if (!navigator.xr) {
        updateStatus('WebXR not supported by this browser. Switching to desktop preview mode (drag to orbit, scroll to zoom).');
        startPreviewMode();
        return;
      }

      const supported = await navigator.xr.isSessionSupported('immersive-ar');
      if (!supported) {
        updateStatus('immersive-ar not supported on this device/browser. Switching to desktop preview mode (drag to orbit, scroll to zoom).');
        startPreviewMode();
        return;
      }

      try {
        updateStatus('Requesting GPS permission...');
        await startGeolocation();
        startCompass();
      } catch (e) {
        updateStatus('Failed to get GPS permission. The model can still be shown, but not positioned by GPS.');
      }

      try {
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test', 'local'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.getElementById('ar-overlay-root') }
        });

        xrSession = session;
        session.addEventListener('end', onSessionEnd);

        renderer.xr.setReferenceSpaceType('local');
        await renderer.xr.setSession(session);

        startBtn.style.display = 'none';
        adjustRow.style.display = 'flex';
        floorRow.style.display = 'flex';
        adjustRow2.style.display = 'flex';

        renderer.setAnimationLoop(onXRFrame);
      } catch (e) {
        console.error(e);
        updateStatus('Failed to start WebXR session: ' + e.message);
        startBtn.disabled = false;
        startBtn.textContent = 'Start AR Experience';
      }
    }

    function onSessionEnd() {
      xrSession = null;
      hitTestSource = null;
      hitTestSourceRequested = false;
      modelPlaced = false;
      planeEverDetected = false;
      if (model) model.visible = false;
      startBtn.style.display = 'block';
      startBtn.disabled = false;
      startBtn.textContent = 'Start AR Experience';
      adjustRow.style.display = 'none';
      floorRow.style.display = 'none';
      adjustRow2.style.display = 'none';
      renderer.setAnimationLoop(null);
    }

    // ---------------------------------------------------------------
    // 桌面預覽模式：裝置/瀏覽器不支援 immersive-ar 時的退路，
    // 跳過 GPS/羅盤/hit-test，直接用一般 Three.js 場景 + 滑鼠軌道控制顯示模型，
    // 方便在筆電上檢查模型外觀(邊緣線、光照、材質)，不需要手機也不需要部署到 GitHub Pages。
    // ---------------------------------------------------------------
    let previewControls = null;

    function startPreviewMode() {
      previewModeActive = true;
      startBtn.style.display = 'none';
      adjustRow.style.display = 'flex';   // 高度/旋轉按鈕在預覽模式一樣可以用，方便檢查模型各角度
      floorRow.style.display = 'flex';
      // GPS 校準/放置按鈕在預覽模式沒有意義(沒有真實定位)，維持隱藏
      adjustRow2.style.display = 'none';

      scene.background = new THREE.Color(0xdddddd); // 給一個中性背景色方便看清楚模型輪廓與邊緣線

      camera.position.set(4, 3, 6);
      camera.lookAt(0, 1, 0);

      previewControls = new OrbitControls(camera, renderer.domElement);
      previewControls.target.set(0, 1, 0);
      previewControls.enableDamping = true;
      previewControls.update();

      if (model) {
        model.visible = true;
        model.position.set(0, 0, 0);
      }

      renderer.setAnimationLoop(() => {
        previewControls.update();
        renderer.render(scene, camera);
      });
    }

    async function initHitTestSource() {
      const viewerSpace = await xrSession.requestReferenceSpace('viewer');
      hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
    }

    function onXRFrame(timestamp, frame) {
      if (!hitTestSourceRequested) {
        hitTestSourceRequested = true;
        initHitTestSource();
      }

      const referenceSpace = renderer.xr.getReferenceSpace();
      const camPose = frame.getViewerPose(referenceSpace);

      // 每一幀把相機位置/朝向存成一般數值與向量，供按鈕之後(非同步)安全使用
      if (camPose) {
        const camPos = camPose.transform.position;
        const camOri = camPose.transform.orientation;
        lastCameraPosition = { x: camPos.x, y: camPos.y, z: camPos.z };

        const camQuat = new THREE.Quaternion(camOri.x, camOri.y, camOri.z, camOri.w);
        const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camQuat);
        fwd.y = 0;
        fwd.normalize();
        lastCameraForward = fwd;
      }

      if (hitTestSource) {
        const hitTestResults = frame.getHitTestResults(hitTestSource);
        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          const pose = hit.getPose(referenceSpace);
          const hp = pose.transform.position;
          lastHitPosition = { x: hp.x, y: hp.y, z: hp.z };

          if (!modelPlaced) {
            planeEverDetected = true;
            placeModelFromCache('Plane detected successfully. Model anchored — stability now relies entirely on device SLAM tracking.');
          }
        } else if (!modelPlaced) {
          updateStatus('Point your phone at the floor/table to scan for a surface...');
        }
      }

      renderer.render(scene, camera);
    }

    // ---------------------------------------------------------------
    // 核心邏輯：依 GPS 距離/方位角 + 羅盤朝向，計算模型在 XR 世界座標中的位置
    // 只使用快取的數值/向量，不依賴任何 XRFrame 物件，按鈕可安全重複呼叫
    // ---------------------------------------------------------------
    function placeModelFromCache(successMessage) {
      if (!model) { updateStatus('Model is still loading...'); return; }
      if (userLat === null || userLon === null) { updateStatus('Waiting for GPS...'); return; }
      if (currentHeading === null) { updateStatus('Waiting for compass data...'); return; }
      if (!lastCameraPosition || !lastCameraForward || !lastHitPosition) { updateStatus('Waiting for plane detection...'); return; }

      const distance = haversineDistance(userLat, userLon, TARGET_LAT, TARGET_LON);
      const targetBearing = bearing(userLat, userLon, TARGET_LAT, TARGET_LON);

      const relativeAngle = toRad(targetBearing - currentHeading);
      const targetDir = lastCameraForward.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), -relativeAngle);

      model.position.set(
        lastCameraPosition.x + targetDir.x * distance,
        lastHitPosition.y, // 高度使用 hit-test 偵測到的平面 Y 座標
        lastCameraPosition.z + targetDir.z * distance
      );
      model.rotation.y = Math.atan2(targetDir.x, targetDir.z);

      model.visible = true;
      modelPlaced = true;
      updateStatus(successMessage || 'Model anchored — stability now relies entirely on device SLAM tracking.');
    }
  </script>
</body>
</html>
