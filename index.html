<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>POC_WebAR_MindAR_Surface</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      mindar-image="imageTargetSrc: ; autoStart: true; showLoading: true;" 
      embedded 
      renderer="colorManagement: true, physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <a-assets>
        <a-asset-item id="my-building" src="1BR.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" mindar-image-camera></a-camera> 

      <a-entity light="type: ambient; color: #FFF; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 0.7" position="-1 4 2"></a-entity>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity
          gltf-model="#my-building"
          scale="10 10 10"
          position="0 0 0"
          rotation="0 0 0"
        >
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
